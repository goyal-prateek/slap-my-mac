name: Build and Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.*"
      - "src-tauri/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from package.json to tauri.conf.json
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Using version: $VERSION"

      - name: Build Tauri (DMG)
        env:
          # CI=true makes Tauri pass --skip-jenkins, which skips Finder layout and
          # leaves .VolumeIcon.icns visible; allow full DMG styling on macOS runners.
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        run: pnpm tauri build

      - name: Summarize build output
        shell: bash
        run: |
          echo "## DMG build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`${{ env.APP_VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          DMGS=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then
            echo "No .dmg found under \`src-tauri/target/release/bundle/dmg/\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          for f in "${DMGS[@]}"; do
            ls -lh "$f" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload DMG to S3
        shell: bash
        run: |
          shopt -s nullglob
          DMGS=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then
            echo "No .dmg found in src-tauri/target/release/bundle/dmg/"
            exit 1
          fi
          DMG="${DMGS[0]}"
          if [ ${#DMGS[@]} -gt 1 ]; then
            echo "Multiple DMGs found; uploading: $DMG"
          fi
          DEST="s3://${{ vars.AWS_S3_BUCKET }}/slap-my-mac/versions/${APP_VERSION}/$(basename "$DMG")"
          echo "Uploading $DMG -> $DEST"
          aws s3 cp "$DMG" "$DEST"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/slap-my-mac" "/slap-my-mac/*"
