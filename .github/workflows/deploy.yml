name: Build and Deploy to S3 + CloudFront

# Deploy job is gated with `if` below until Apple Developer Program + signing/notarization exist.
on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.*"
      - "src-tauri/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    # Gate: workflow `env` cannot be used here. Flip to true (or e.g. vars.TAURI_CI_DEPLOY_ENABLED == 'true') after Apple developer account + secrets.
    if: ${{ false }}
    name: Build and Deploy
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from package.json to tauri.conf.json
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Using version: $VERSION"

      # Browser downloads are quarantined; without Developer ID signing + notarization,
      # Gatekeeper reports the app as "damaged". See repository secrets listed below.
      - name: Import Apple code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "::error::Set repository secrets APPLE_CERTIFICATE (base64 .p12) and APPLE_CERTIFICATE_PASSWORD, plus APPLE_ID, APPLE_PASSWORD (app-specific password), and APPLE_TEAM_ID for notarization. See https://v2.tauri.app/distribute/sign/macos/"
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No \"Developer ID Application\" identity in the imported .p12. Create/export a Developer ID Application certificate (not Apple Development) from developer.apple.com."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Verify notarization secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          [ -z "${APPLE_ID:-}" ] && { echo "::error::APPLE_ID secret is not set"; missing=1; }
          [ -z "${APPLE_PASSWORD:-}" ] && { echo "::error::APPLE_PASSWORD secret is not set (use an app-specific password, not your Apple ID login)"; missing=1; }
          [ -z "${APPLE_TEAM_ID:-}" ] && { echo "::error::APPLE_TEAM_ID secret is not set (10-character Team ID from developer.apple.com)"; missing=1; }
          [ "$missing" -eq 0 ] || exit 1

      # APPLE_SIGNING_IDENTITY comes from GITHUB_ENV (import step); do not set it via ${{ env.* }} here
      # or GitHub Actions can overwrite it with an empty value.
      - name: Build Tauri (DMG)
        env:
          # CI=true makes Tauri pass --skip-jenkins, which skips Finder layout and
          # leaves .VolumeIcon.icns visible; allow full DMG styling on macOS runners.
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build

      - name: Summarize build output
        shell: bash
        run: |
          echo "## DMG build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`${{ env.APP_VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          DMGS=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then
            echo "No .dmg found under \`src-tauri/target/release/bundle/dmg/\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          for f in "${DMGS[@]}"; do
            ls -lh "$f" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload DMG to S3
        shell: bash
        run: |
          shopt -s nullglob
          DMGS=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then
            echo "No .dmg found in src-tauri/target/release/bundle/dmg/"
            exit 1
          fi
          DMG="${DMGS[0]}"
          if [ ${#DMGS[@]} -gt 1 ]; then
            echo "Multiple DMGs found; uploading: $DMG"
          fi
          DEST="s3://${{ vars.AWS_S3_BUCKET }}/slap-my-mac/versions/${APP_VERSION}/$(basename "$DMG")"
          echo "Uploading $DMG -> $DEST"
          aws s3 cp "$DMG" "$DEST" \
            --content-type "application/x-apple-diskimage" \
            --content-disposition "attachment; filename=\"$(basename "$DMG")\""

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/slap-my-mac" "/slap-my-mac/*"
